<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-label="Each sensor runs its own detector to an object list; the two lists are merged by matching positions at the end."><style>
text{font-family:'Inter',system-ui,Arial,sans-serif}
.th{font-weight:600;font-size:14px}.ts{font-size:12px}
.dg-teal rect{fill:#E1F5EE;stroke:#1D9E75;stroke-width:.8}.dg-teal .th{fill:#085041}.dg-teal .ts{fill:#0F6E56}
.dg-coral rect{fill:#FAECE7;stroke:#D85A30;stroke-width:.8}.dg-coral .th{fill:#712B13}.dg-coral .ts{fill:#993C1D}
.dg-purple rect{fill:#EEEDFE;stroke:#7F77DD;stroke-width:.8}.dg-purple .th{fill:#3C3489}.dg-purple .ts{fill:#534AB7}
.dg-gray rect{fill:#F1EFE8;stroke:#888780;stroke-width:.8}.dg-gray .th{fill:#2C2C2A}.dg-gray .ts{fill:#5F5E5A}
.arr{stroke:#A6A49B;stroke-width:1.4;fill:none}.bg{fill:#FCFBF8}
</style><rect class="bg" x="0" y="0" width="680" height="440"/>
        <defs><marker id="arD" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#A6A49B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
        <g class="dg-teal"><rect x="70" y="40" width="130" height="44" rx="8"/><text class="th" x="135" y="62" text-anchor="middle" dominant-baseline="central">stereo RGB</text></g>
        <g class="dg-teal"><rect x="215" y="40" width="135" height="44" rx="8"/><text class="th" x="282" y="62" text-anchor="middle" dominant-baseline="central">stereo depth</text></g>
        <g class="dg-coral"><rect x="445" y="40" width="150" height="44" rx="8"/><text class="th" x="520" y="62" text-anchor="middle" dominant-baseline="central">LiDAR</text></g>
        <g class="dg-teal"><rect x="70" y="110" width="280" height="56" rx="8"/><text class="th" x="210" y="132" text-anchor="middle" dominant-baseline="central">Camera BEV detector</text><text class="ts" x="210" y="150" text-anchor="middle" dominant-baseline="central">stereo-only</text></g>
        <g class="dg-coral"><rect x="445" y="110" width="150" height="56" rx="8"/><text class="th" x="520" y="132" text-anchor="middle" dominant-baseline="central">LiDAR detector</text><text class="ts" x="520" y="150" text-anchor="middle" dominant-baseline="central">pillars / DBSCAN</text></g>
        <g class="dg-teal"><rect x="70" y="190" width="280" height="56" rx="8"/><text class="th" x="210" y="212" text-anchor="middle" dominant-baseline="central">Object list A</text><text class="ts" x="210" y="230" text-anchor="middle" dominant-baseline="central">(x, y) + class</text></g>
        <g class="dg-coral"><rect x="445" y="190" width="150" height="56" rx="8"/><text class="th" x="520" y="212" text-anchor="middle" dominant-baseline="central">Object list B</text><text class="ts" x="520" y="230" text-anchor="middle" dominant-baseline="central">(x, y)</text></g>
        <g class="dg-purple"><rect x="150" y="280" width="420" height="56" rx="8"/><text class="th" x="360" y="302" text-anchor="middle" dominant-baseline="central">Match + merge</text><text class="ts" x="360" y="320" text-anchor="middle" dominant-baseline="central">detection-level</text></g>
        <g class="dg-gray"><rect x="260" y="370" width="200" height="44" rx="8"/><text class="th" x="360" y="392" text-anchor="middle" dominant-baseline="central">final objects</text></g>
        <line x1="135" y1="84" x2="135" y2="110" class="arr" marker-end="url(#arD)"/>
        <line x1="282" y1="84" x2="282" y2="110" class="arr" marker-end="url(#arD)"/>
        <line x1="210" y1="166" x2="210" y2="190" class="arr" marker-end="url(#arD)"/>
        <line x1="520" y1="84" x2="520" y2="110" class="arr" marker-end="url(#arD)"/>
        <line x1="520" y1="166" x2="520" y2="190" class="arr" marker-end="url(#arD)"/>
        <line x1="210" y1="246" x2="290" y2="280" class="arr" marker-end="url(#arD)"/>
        <line x1="520" y1="246" x2="440" y2="280" class="arr" marker-end="url(#arD)"/>
        <line x1="360" y1="336" x2="360" y2="370" class="arr" marker-end="url(#arD)"/>
        </svg>